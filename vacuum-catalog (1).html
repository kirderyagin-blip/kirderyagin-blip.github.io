<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vacuum Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--card:#141414;--card2:#1c1c1c;--accent:#f0c040;--accent2:#e05a20;--green:#3ecf6e;--text:#f0ede8;--muted:#777;--border:#252525;--r:16px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Manrope',sans-serif}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;flex-direction:column}
.screen.active{display:flex}
#langScreen{align-items:center;justify-content:center;padding:40px 28px;background:var(--bg)}
.lang-logo{font-size:60px;margin-bottom:18px;text-align:center}
.lang-title{font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:3px;color:var(--accent);margin-bottom:5px;text-align:center}
.lang-sub{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:44px;text-align:center}
.lang-cards{width:100%;display:flex;flex-direction:column;gap:14px}
.lang-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px 20px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s}
.lang-card:active{transform:scale(.97)}
.lang-flag{font-size:30px;margin-bottom:10px}
.lang-name{font-family:'Bebas Neue',sans-serif;font-size:26px;margin-bottom:5px}
.lang-hint{font-size:13px;color:#aaa}
.lang-arrow{position:absolute;bottom:18px;right:18px;font-size:20px;color:#444}
#splashScreen{align-items:center;justify-content:center;padding:32px 24px;background:var(--bg)}
.splash-logo{font-family:'Bebas Neue',sans-serif;font-size:50px;letter-spacing:4px;line-height:1;text-align:center;margin-bottom:6px}
.splash-logo em{color:var(--accent);font-style:normal}
.splash-sub{font-size:11px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:40px;text-align:center}
.mode-cards{width:100%;display:flex;flex-direction:column;gap:14px}
.mode-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px 20px;cursor:pointer;position:relative;overflow:hidden;transition:transform .15s}
.mode-card:active{transform:scale(.97)}
.mode-icon{font-size:32px;margin-bottom:10px}
.mode-label{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:1px;margin-bottom:5px}
.mode-label.y{color:var(--accent)}.mode-label.g{color:var(--green)}
.mode-desc{font-size:13px;color:#aaa;line-height:1.5}
.mode-arrow{position:absolute;bottom:18px;right:18px;font-size:20px;color:#444}
.top-bar{position:sticky;top:0;z-index:50;background:rgba(10,10,10,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:13px 16px;gap:10px;flex-shrink:0}
.back-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.top-bar-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--accent);flex:1}
.lang-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:5px 10px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0}
.filters{padding:10px 14px 6px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.filters::-webkit-scrollbar{display:none}
.fbtn{background:var(--card);border:1px solid var(--border);color:var(--muted);font-family:'Manrope',sans-serif;font-size:11px;font-weight:700;padding:6px 13px;border-radius:30px;cursor:pointer;white-space:nowrap;transition:all .2s}
.fbtn.active,.fbtn:hover{background:var(--accent);border-color:var(--accent);color:#000}
.catalog-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:9px 11px 80px}
.c-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .2s;animation:fUp .35s ease both}
.c-card:active{transform:scale(.97)}
@keyframes fUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.c-img{width:100%;aspect-ratio:1;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;border-bottom:1px solid var(--border)}
.c-tag-type{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.8);color:var(--accent);font-size:8px;font-weight:700;padding:3px 7px;border-radius:6px;text-transform:uppercase}
.c-tag-top{position:absolute;top:6px;right:6px;background:var(--accent2);color:#fff;font-size:8px;font-weight:700;padding:3px 7px;border-radius:6px}
.c-body{padding:9px}
.c-brand{font-size:8px;font-weight:700;letter-spacing:1px;color:var(--muted);text-transform:uppercase;margin-bottom:2px}
.c-name{font-size:12px;font-weight:700;margin-bottom:5px;line-height:1.3}
.c-bar-row{display:flex;align-items:center;gap:4px;margin-bottom:7px}
.c-bar-label{font-size:9px;color:var(--muted);white-space:nowrap;min-width:30px}
.c-bar{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.c-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px}
.c-price{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent);letter-spacing:1px}
.c-price span{font-family:'Manrope',sans-serif;font-size:10px;color:var(--muted)}
#quizScreen{padding-bottom:40px}
.quiz-progress{padding:14px 18px 0;flex-shrink:0}
.q-prog-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;display:flex;justify-content:space-between}
.q-prog-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:22px}
.q-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--green));border-radius:2px;transition:width .4s ease}
.q-step{padding:0 18px;animation:fUp .3s ease}
.q-num{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.q-question{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;line-height:1.2;margin-bottom:5px}
.q-sub{font-size:12px;color:#999;line-height:1.5;margin-bottom:20px}
.q-options{display:flex;flex-direction:column;gap:9px}
.q-opt{background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .2s,background .2s,transform .15s}
.q-opt:active{transform:scale(.98)}
.q-opt.sel{border-color:var(--green);background:rgba(62,207,110,.07)}
.q-opt-icon{font-size:24px;flex-shrink:0}
.q-opt-text{font-size:13px;font-weight:600}
.q-opt-sub{font-size:11px;color:var(--muted);margin-top:2px}
#resultScreen{padding-bottom:60px}
.res-header{padding:22px 18px 0;animation:fUp .4s ease}
.res-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(62,207,110,.12);border:1px solid rgba(62,207,110,.3);color:var(--green);font-size:11px;font-weight:700;padding:5px 12px;border-radius:30px;margin-bottom:14px}
.res-title{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;margin-bottom:6px}
.res-why{font-size:13px;color:#aaa;line-height:1.6;margin-bottom:22px}
.res-main{margin:0 14px 14px;background:var(--card);border:1.5px solid var(--green);border-radius:20px;overflow:hidden;animation:fUp .5s .1s ease both;cursor:pointer}
.res-img{height:160px;background:var(--card2);display:flex;align-items:center;justify-content:center;font-size:80px;border-bottom:1px solid var(--border);position:relative}
.res-main-lbl{position:absolute;bottom:12px;left:12px;background:var(--green);color:#000;font-size:10px;font-weight:800;padding:4px 11px;border-radius:20px;text-transform:uppercase;letter-spacing:1px}
.res-info{padding:16px}
.res-brand{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.res-name{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:1px;margin-bottom:7px}
.res-blurb{font-size:12px;color:#aaa;line-height:1.5;margin-bottom:12px}
.res-price{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--accent);letter-spacing:1px}
.res-price-u{font-size:13px;color:var(--muted);margin-left:4px}
.res-alts-title{padding:0 18px 9px;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
.res-alts{display:flex;gap:9px;padding:0 14px 22px;overflow-x:auto;scrollbar-width:none}
.res-alts::-webkit-scrollbar{display:none}
.alt-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px;min-width:140px;cursor:pointer;transition:transform .15s;animation:fUp .4s .2s ease both}
.alt-card:active{transform:scale(.97)}
.alt-icon{font-size:32px;margin-bottom:7px}
.alt-brand{font-size:8px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.alt-name{font-size:12px;font-weight:700;margin-bottom:5px}
.alt-price{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--accent)}
.retry-btn{margin:0 14px 8px;width:calc(100% - 28px);background:transparent;border:1.5px solid var(--border);color:var(--muted);font-family:'Manrope',sans-serif;font-size:13px;font-weight:700;padding:14px;border-radius:12px;cursor:pointer}
#detailScreen{padding-bottom:40px}
.det-hero{background:var(--card2);width:100%;height:220px;display:flex;align-items:center;justify-content:center;font-size:100px;border-bottom:1px solid var(--border);position:relative;flex-shrink:0}
.det-type-tag{position:absolute;bottom:12px;left:12px;background:var(--accent);color:#000;font-size:10px;font-weight:800;padding:4px 13px;border-radius:20px;text-transform:uppercase;letter-spacing:1px}
.det-body{padding:0 16px}
.det-basic{padding:18px 0 22px;border-bottom:1px solid var(--border)}
.det-brand{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.det-name{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;line-height:1.05;margin-bottom:9px}
.det-desc{font-size:13px;color:#bbb;line-height:1.6;margin-bottom:16px}
.det-price{font-family:'Bebas Neue',sans-serif;font-size:40px;color:var(--accent);letter-spacing:1px}
.det-price-u{font-size:14px;color:var(--muted);margin-left:4px}
.key-specs{display:flex;flex-wrap:wrap;gap:7px;margin-top:18px}
.kspec{background:var(--card2);border:1px solid var(--border);border-radius:30px;padding:6px 13px;font-size:11px;font-weight:700}
.kspec-lbl{color:var(--muted);margin-right:4px}
.scroll-hint{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 0 5px;font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;font-weight:700}
.arrow{animation:bounce 1.5s infinite;display:inline-block}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}
.det-deep{padding:0 0 20px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;color:var(--accent);margin:26px 0 13px}
.tech-cards{display:flex;flex-direction:column;gap:13px}
.tech-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.tech-ph{width:100%;height:100px;background:linear-gradient(135deg,var(--card2),#222);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px}
.tech-ph-icon{font-size:36px}
.tech-ph-lbl{font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.tech-info{padding:13px 15px}
.tech-name{font-size:13px;font-weight:800;margin-bottom:4px}
.tech-desc{font-size:12px;color:#aaa;line-height:1.55}
.specs-tbl{width:100%;border-collapse:collapse}
.specs-tbl tr{border-bottom:1px solid var(--border)}
.specs-tbl tr:last-child{border-bottom:none}
.specs-tbl td{padding:11px 0;font-size:12px}
.specs-tbl td:first-child{color:var(--muted);width:50%}
.specs-tbl td:last-child{font-weight:700;text-align:right}
.feat-list{list-style:none;display:flex;flex-direction:column;gap:9px}
.feat-list li{display:flex;align-items:flex-start;gap:11px;font-size:12px;color:#ccc;line-height:1.5}
.feat-list li::before{content:"\2713";color:var(--green);font-weight:800;width:20px;height:20px;background:rgba(62,207,110,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;margin-top:1px}
</style>
</head>
<body>

<div id="langScreen" class="screen active">
  <div class="lang-logo">&#x1F9F9;</div>
  <div class="lang-title">VACUUM</div>
  <div class="lang-sub">CATALOG &middot; קטלוג</div>
  <div class="lang-cards">
    <div class="lang-card" id="btnHe">
      <div class="lang-flag" style="font-size:40px">&#127470;&#127473;</div>
      <div class="lang-name" style="color:var(--accent);direction:rtl">עברית</div>
      <div class="lang-hint" style="direction:rtl">המשך בעברית</div>
      <div class="lang-arrow">&larr;</div>
    </div>
    <div class="lang-card" id="btnRu">
      <div class="lang-flag" style="font-size:40px">&#127479;&#127482;</div>
      <div class="lang-name" style="color:var(--green)">РУССКИЙ</div>
      <div class="lang-hint">Продолжить на русском</div>
      <div class="lang-arrow">&rarr;</div>
    </div>
  </div>
</div>

<div id="splashScreen" class="screen">
  <div class="splash-logo">VACUUM<em>S</em></div>
  <div id="splashSub" class="splash-sub">Catalog</div>
  <div class="mode-cards">
    <div class="mode-card" onclick="goScreen('catalogScreen');renderCatalog()">
      <div class="mode-icon">&#x1F4CB;</div>
      <div class="mode-label y" id="lblCatalog">CATALOG</div>
      <div class="mode-desc" id="dscCatalog">All models</div>
      <div class="mode-arrow">&rarr;</div>
    </div>
    <div class="mode-card" onclick="startQuiz()">
      <div class="mode-icon">&#x1F3AF;</div>
      <div class="mode-label g" id="lblQuiz">FIND FOR ME</div>
      <div class="mode-desc" id="dscQuiz">4 questions</div>
      <div class="mode-arrow">&rarr;</div>
    </div>
  </div>
</div>

<div id="catalogScreen" class="screen">
  <div class="top-bar">
    <div class="back-btn" onclick="goScreen('splashScreen')">&#8592;</div>
    <div class="top-bar-title" id="catTitle">CATALOG</div>
    <div class="lang-btn" onclick="goScreen('langScreen')">&#x1F310;</div>
  </div>
  <div class="filters" id="filterBar"></div>
  <div class="catalog-grid" id="catalogGrid"></div>
</div>

<div id="quizScreen" class="screen">
  <div class="top-bar">
    <div class="back-btn" onclick="goScreen('splashScreen')">&#8592;</div>
    <div class="top-bar-title" id="quizTitle">QUIZ</div>
    <div class="lang-btn" onclick="goScreen('langScreen')">&#x1F310;</div>
  </div>
  <div class="quiz-progress">
    <div class="q-prog-label"><span id="progLbl">PROGRESS</span><span id="progTxt">1/4</span></div>
    <div class="q-prog-track"><div class="q-prog-fill" id="progFill" style="width:25%"></div></div>
  </div>
  <div id="quizStep" class="q-step"></div>
</div>

<div id="resultScreen" class="screen">
  <div class="top-bar">
    <div class="back-btn" onclick="goScreen('splashScreen')">&#8592;</div>
    <div class="top-bar-title" id="resTitle">RESULT</div>
    <div class="lang-btn" onclick="goScreen('langScreen')">&#x1F310;</div>
  </div>
  <div class="res-header">
    <div class="res-badge" id="resBadge">&#x2756; Result</div>
    <div class="res-title" id="resName"></div>
    <div class="res-why" id="resWhy"></div>
  </div>
  <div class="res-main" id="resMain"></div>
  <div class="res-alts-title" id="alsoTitle">ALSO CONSIDER</div>
  <div class="res-alts" id="resAlts"></div>
  <button class="retry-btn" id="retryBtn" onclick="startQuiz()">Retry</button>
</div>

<div id="detailScreen" class="screen">
  <div class="top-bar">
    <div class="back-btn" id="detBack">&#8592;</div>
    <div class="top-bar-title" id="detTopName"></div>
  </div>
  <div class="det-hero">
    <span id="detEmoji"></span>
    <div class="det-type-tag" id="detTypeTag"></div>
  </div>
  <div class="det-body">
    <div class="det-basic" id="detBasic"></div>
    <div class="scroll-hint" id="scrollHint">Scroll <span class="arrow">&#8595;</span></div>
    <div class="det-deep" id="detDeep"></div>
  </div>
</div>

<script>
var L="ru", CF="all", QA={}, QS=0, FROM="catalogScreen";

var UI={
ru:{dir:"ltr",splashSub:"Каталог магазина · 23 модели",lblCatalog:"СМОТРЕТЬ КАТАЛОГ",dscCatalog:"Все 23 модели с ценами и технологиями.",lblQuiz:"ПОДОБРАТЬ ДЛЯ МЕНЯ",dscQuiz:"4 вопроса — рекомендация из ассортимента.",catTitle:"КАТАЛОГ",quizTitle:"ПОДБОР",resTitle:"РЕКОМЕНДАЦИЯ",resBadge:"❖ Подобрано для вас",alsoTitle:"ТАКЖЕ РАССМОТРИТЕ",retry:"↺ Пройти заново",yourChoice:"Ваш выбор",scrollHint:"Листайте вниз",howWorks:"КАК ЭТО РАБОТАЕТ",allSpecs:"ХАРАКТЕРИСТИКИ",featTitle:"ОСОБЕННОСТИ",progLbl:"ПРОГРЕСС",qLbl:"ВОПРОС",fAll:"Все (23)",fRob:"Роботы",fWet:"Моющие",fCord:"Беспроводные",sType:"Тип",sSuc:"Всасывание",sWt:"Вес",sFlt:"Фильтр",sNs:"Шум",sRt:"Батарея",askSell:"Уточнить у продавца",
forArea:"Для",bestIn:"лучший",inBudget:"в вашем бюджете.",areaS:"небольшой площади",areaM:"стандартной квартиры",areaL:"большого дома",algN:"",algL:" с хорошей фильтрацией",algS:" с максимальной фильтрацией",tR:"робот",tW:"моющий",tC:"беспроводной",
tLbl:{"робот":"робот","моющий":"моющий","беспроводной":"беспроводной"},
Q:[
{id:"type",q:"КАК ХОТИТЕ УБИРАТЬСЯ?",sub:"Это самый важный выбор.",opts:[{ic:"🤖",t:"Робот — сам уберётся",s:"Без участия",v:3},{ic:"💧",t:"Мойка пола",s:"Влажная + сухая",v:4},{ic:"🔋",t:"Беспроводной",s:"Лёгкий, везде",v:2}]},
{id:"area",q:"ПЛОЩАДЬ ДОМА?",sub:"Влияет на мощность.",opts:[{ic:"🏠",t:"До 70 м²",s:"1–2 комнаты",v:1},{ic:"🏡",t:"70–130 м²",s:"Стандартная квартира",v:2},{ic:"🏘️",t:"Больше 130 м²",s:"Большой дом",v:3}]},
{id:"allergy",q:"ЕСТЬ АЛЛЕРГИЯ?",sub:"Пыль, шерсть, клещи.",opts:[{ic:"😊",t:"Нет",s:"Обычная чувствительность",v:1},{ic:"🤧",t:"Есть немного",s:"Иногда реагирую",v:2},{ic:"😷",t:"Сильная",s:"Нужна макс. фильтрация",v:3}]},

function u(id){return document.getElementById(id);}
function tl(o){return o[L]||o.ru;}
function tLbl(type){var m=UI[L].tLbl;return m[type]||type;}

function goScreen(id){
  document.querySelectorAll(".screen").forEach(function(s){s.classList.remove("active");});
  u(id).classList.add("active");
  u(id).scrollTop=0;
}

// Lang buttons - use addEventListener to avoid inline onclick issues
document.addEventListener("DOMContentLoaded", function(){
  var he = document.getElementById("btnHe");
  var ru = document.getElementById("btnRu");
  if(he) he.addEventListener("click", function(){ setLang("he"); });
  if(ru) ru.addEventListener("click", function(){ setLang("ru"); });
});

function setLang(l){
  L=l;
  document.documentElement.lang=l;
  document.body.dir=UI[l].dir;
  var t=UI[l];
  u("splashSub").textContent=t.splashSub;
  u("lblCatalog").textContent=t.lblCatalog;
  u("dscCatalog").textContent=t.dscCatalog;
  u("lblQuiz").textContent=t.lblQuiz;
  u("dscQuiz").textContent=t.dscQuiz;
  goScreen("splashScreen");
}

function renderCatalog(){
  u("catTitle").textContent=UI[L].catTitle;
  buildFilters();
  buildGrid();
}

function buildFilters(){
  var t=UI[L];
  u("filterBar").innerHTML=
    '<button class="fbtn active" data-f="all">'+t.fAll+'</button>'+
    '<button class="fbtn" data-f="робот">'+t.fRob+'</button>'+
    '<button class="fbtn" data-f="моющий">'+t.fWet+'</button>'+
    '<button class="fbtn" data-f="беспроводной">'+t.fCord+'</button>';
  u("filterBar").addEventListener("click",function(e){
    var b=e.target.closest(".fbtn");if(!b)return;
    CF=b.dataset.f;
    u("filterBar").querySelectorAll(".fbtn").forEach(function(x){x.classList.remove("active");});
    b.classList.add("active");buildGrid();
  });
}

function buildGrid(){
  var list=CF==="all"?PRODS:PRODS.filter(function(p){return p.type===CF;});
  u("catalogGrid").innerHTML=list.map(function(p,i){
    var pr=p.price?p.price.toLocaleString()+" &#8362;":UI[L].askSell;
    var prStyle=p.price?"":"font-size:10px;font-family:Manrope;color:var(--muted)";
    return "<div class='c-card' data-pid='"+p.id+"' data-from='catalogScreen' style='animation-delay:"+(i*.04)+"s'>"+
      "<div class='c-img'>"+
        "<div class='c-tag-type'>"+tLbl(p.type)+"</div>"+
        (p.best?"<div class='c-tag-top'>TOP</div>":"")+
        p.e+
      "</div>"+
      "<div class='c-body'>"+
        "<div class='c-brand'>"+p.brand+"</div>"+
        "<div class='c-name'>"+p.name+"</div>"+
        "<div class='c-bar-row'><span class='c-bar-label'>"+p.suc+"</span><div class='c-bar'><div class='c-bar-fill' style='width:"+p.pct+"%'></div></div></div>"+
        "<div class='c-price' style='"+prStyle+"'>"+pr+"</div>"+
      "</div></div>";
  }).join("");
  // Attach click handlers after render
  u("catalogGrid").querySelectorAll(".c-card").forEach(function(el){
    el.addEventListener("click",function(){
      openDetail(parseInt(this.getAttribute("data-pid")), this.getAttribute("data-from"));
    });
  });
}

function startQuiz(){
  QA={};QS=0;
  u("quizTitle").textContent=UI[L].quizTitle;
  renderQ();
  goScreen("quizScreen");
}

function renderQ(){
  var qs=UI[L].Q;var q=qs[QS];var t=UI[L];
  u("progFill").style.width=((QS+1)/qs.length*100)+"%";
  u("progLbl").textContent=t.progLbl;
  u("progTxt").textContent=(QS+1)+" / "+qs.length;
  u("quizStep").innerHTML=
    "<div class='q-num'>"+t.qLbl+" "+(QS+1)+"</div>"+
    "<div class='q-question'>"+q.q+"</div>"+
    "<div class='q-sub'>"+q.sub+"</div>"+
    "<div class='q-options'>"+
    q.opts.map(function(o){
      return "<div class='q-opt"+(QA[q.id]===o.v?" sel":"")+"' onclick='pickQ(""+q.id+"","+o.v+",this)'>"+
        "<div class='q-opt-icon'>"+o.ic+"</div>"+
        "<div><div class='q-opt-text'>"+o.t+"</div><div class='q-opt-sub'>"+o.s+"</div></div>"+
        "</div>";
    }).join("")+
    "</div>";
}

function pickQ(id,val,el){
  QA[id]=val;
  document.querySelectorAll(".q-opt").forEach(function(e){e.classList.remove("sel");});
  el.classList.add("sel");
  setTimeout(function(){QS++;if(QS>=UI[L].Q.length)showRes();else renderQ();},350);
}

function scoreP(p){
  var s=0,a=QA;
  var tm={2:"беспроводной",3:"робот",4:"моющий"};
  if(p.type===tm[a.type])s+=40;
  if(a.allergy===3&&p.sAl>=3)s+=15;
  else if(a.allergy===2&&p.sAl>=2)s+=10;
  else s+=5;
  if(p.sA>=(a.area||1))s+=15;
  var bm={1:[0,1700],2:[1700,2500],3:[2500,3600],4:[3600,9999]};
  var r=bm[a.budget]||[0,9999];
  if(p.price>=r[0]&&p.price<=r[1])s+=25;
  else if(p.price<r[0]&&p.price>0)s+=10;
  if(p.best)s+=5;
  return s;
}

function showRes(){
  var sorted=PRODS.map(function(p){return Object.assign({},p,{_s:scoreP(p)});}).sort(function(a,b){return b._s-a._s;});
  var best=sorted[0],alts=sorted.slice(1,4);
  var t=UI[L];
  var aM={1:t.areaS,2:t.areaM,3:t.areaL};
  var alM={1:t.algN,2:t.algL,3:t.algS};
  var tM={2:t.tC,3:t.tR,4:t.tW};
  u("resTitle").textContent=t.resTitle;
  u("resBadge").textContent=t.resBadge;
  u("alsoTitle").textContent=t.alsoTitle;
  u("retryBtn").textContent=t.retry;
  u("resName").textContent=best.brand+" "+best.name;
  u("resWhy").textContent=t.forArea+" "+(aM[QA.area]||"")+(alM[QA.allergy]||"")+" — "+t.bestIn+" "+(tM[QA.type]||tLbl(best.type))+" "+t.inBudget+" "+tl(best.desc);
  u("resMain").innerHTML=
    "<div class='res-img'>"+best.e+"<div class='res-main-lbl'>"+t.yourChoice+"</div></div>"+
    "<div class='res-info'>"+
      "<div class='res-brand'>"+best.brand+"</div>"+
      "<div class='res-name'>"+best.name+"</div>"+
      "<div class='res-blurb'>"+tl(best.desc)+"</div>"+
      "<span class='res-price'>"+(best.price?best.price.toLocaleString():"&#8212;")+"</span>"+
      "<span class='res-price-u'>&#8362;</span>"+
    "</div>";
  u("resMain").onclick=function(){openDetail(best.id,"resultScreen");};
  u("resAlts").innerHTML=alts.map(function(p){
    return "<div class='alt-card' data-pid='"+p.id+"' data-from='resultScreen'>"+
      "<div class='alt-icon'>"+p.e+"</div>"+
      "<div class='alt-brand'>"+p.brand+"</div>"+
      "<div class='alt-name'>"+p.name+"</div>"+
      "<div class='alt-price'>"+(p.price?p.price.toLocaleString()+" &#8362;":"&#8212;")+"</div>"+
    "</div>";
  }).join("");
  // attach click handlers
  u("resAlts").querySelectorAll(".alt-card").forEach(function(el){
    el.addEventListener("click",function(){
      openDetail(parseInt(this.getAttribute("data-pid")),this.getAttribute("data-from"));
    });
  });
  u("resMain").querySelectorAll(".res-img,.res-info,.res-name,.res-blurb,.res-brand").forEach(function(el){
    el.style.pointerEvents="none";
  })
  goScreen("resultScreen");
}

function openDetail(id,fromS){
  FROM=fromS;
  var p=null;for(var i=0;i<PRODS.length;i++){if(PRODS[i].id===id){p=PRODS[i];break;}}
  u("detBack").onclick=function(){goScreen(FROM);};
  u("detTopName").textContent=p.brand+" "+p.name;
  u("detEmoji").textContent=p.e;
  u("detTypeTag").textContent=tLbl(p.type);
  u("scrollHint").innerHTML=UI[L].scrollHint+' <span class="arrow">&#8595;</span>';
  var pr=p.price?"<span class='det-price'>"+p.price.toLocaleString()+"</span><span class='det-price-u'>&#8362;</span>":
    "<span class='det-price' style='font-size:18px;color:var(--muted)'>"+UI[L].askSell+"</span>";
  var t=UI[L];
  u("detBasic").innerHTML=
    "<div class='det-brand'>"+p.brand+"</div>"+
    "<div class='det-name'>"+p.name+"</div>"+
    "<div class='det-desc'>"+tl(p.desc)+"</div>"+pr+
    "<div class='key-specs'>"+
      "<div class='kspec'><span class='kspec-lbl'>"+t.sType+"</span>"+tLbl(p.type)+"</div>"+
      "<div class='kspec'><span class='kspec-lbl'>"+t.sSuc+"</span>"+p.suc+"</div>"+
      "<div class='kspec'><span class='kspec-lbl'>"+t.sWt+"</span>"+p.wt+"</div>"+
      "<div class='kspec'><span class='kspec-lbl'>"+t.sFlt+"</span>"+p.flt+"</div>"+
      "<div class='kspec'><span class='kspec-lbl'>"+t.sNs+"</span>"+p.ns+"</div>"+
      "<div class='kspec'><span class='kspec-lbl'>"+t.sRt+"</span>"+p.rt+"</div>"+
    "</div>";
  var tcH=p.techs.map(function(tc){
    return "<div class='tech-card'>"+
      "<div class='tech-ph'><div class='tech-ph-icon'>"+tc.ic+"</div><div class='tech-ph-lbl'>"+tl(tc.n).substring(0,22).toUpperCase()+"</div></div>"+
      "<div class='tech-info'><div class='tech-name'>"+tc.ic+" "+tl(tc.n)+"</div><div class='tech-desc'>"+tl(tc.d)+"</div></div>"+
    "</div>";
  }).join("");
  var spH=p.specs.map(function(r){return "<tr><td>"+r[0]+"</td><td>"+r[1]+"</td></tr>";}).join("");
  var ftH=tl(p.feat).map(function(f){return "<li>"+f+"</li>";}).join("");
  u("detDeep").innerHTML=
    "<div style='padding-top:6px;font-size:12px;color:#999;line-height:1.65'>"+tl(p.deep)+"</div>"+
    "<div class='sec-title'>"+t.howWorks+"</div>"+
    "<div class='tech-cards'>"+tcH+"</div>"+
    "<div class='sec-title'>"+t.allSpecs+"</div>"+
    "<table class='specs-tbl'>"+spH+"</table>"+
    "<div class='sec-title'>"+t.featTitle+"</div>"+
    "<ul class='feat-list'>"+ftH+"</ul>";
  goScreen("detailScreen");
}
</script></body></html>
